<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Super Beto</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

#splash {
    position: fixed;
    inset: 0;
    background-position: center center;
    background-repeat: no-repeat;
    background-size: contain; /* shows full image */
    background-color: #000;
}
</style>
</head>

<body>

<div id="splash"></div>

<script>
const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);

const splash = document.getElementById("splash");

splash.style.backgroundImage = `url(${
    isMobile ? "assets/splash_p.png" : "assets/splash.png"
})`;

setTimeout(() => {
    window.location.replace(
        isMobile ? "mobile.html" : "web.html"
    );
}, 5000);
</script>

</body>
</html>
